template:
  name: Integration Test
  identifier: integration_test
  versionLabel: v1.1.0
  type: Stage
  projectIdentifier: platform
  orgIdentifier: platform
  tags: {}
  spec:
    type: CI
    spec:
      cloneCodebase: true
      execution:
        steps:
          - step:
              type: Run
              name: Integration Tests
              identifier: integrationTests
              spec:
                connectorRef: <+input>
                image: <+input>
                command: pytest -m integration
              timeout: 30m
      variables:
        # MINOR: new optional test suite selector.
        - name: testSuite
          type: String
          value: <+input>.default("all")
        # MINOR: new optional parallelism control.
        - name: parallelJobs
          type: Number
          value: <+input>.default(4)
