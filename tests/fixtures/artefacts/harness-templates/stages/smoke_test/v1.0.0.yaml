template:
  name: Smoke Test
  identifier: smoke_test
  versionLabel: v1.0.0
  type: Stage
  projectIdentifier: platform
  orgIdentifier: platform
  tags: {}
  spec:
    type: Custom
    spec:
      execution:
        steps:
          - step:
              type: ShellScript
              name: Smoke
              identifier: smoke
              spec:
                shell: Bash
                source:
                  type: Inline
                  spec:
                    script: |
                      curl -f http://<+input>/health
              timeout: 5m
