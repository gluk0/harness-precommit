template:
  name: Rollback Deploy
  identifier: rollback_deploy
  versionLabel: v1.1.0
  type: Stage
  projectIdentifier: platform
  orgIdentifier: platform
  tags: {}
  spec:
    type: Deployment
    spec:
      deploymentType: Kubernetes
      service:
        serviceRef: <+input>
      execution:
        steps:
          - step:
              type: K8sRollingRollback
              name: Rollback
              identifier: rollback
              spec: {}
              timeout: 10m
      variables:
        # MINOR: new optional rollback reason.
        - name: reason
          type: String
          value: <+input>.default("manual")
        # MINOR: new optional team notification toggle.
        - name: notifyTeam
          type: String
          value: <+input>.default("true")
