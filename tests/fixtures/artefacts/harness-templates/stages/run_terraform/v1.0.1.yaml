template:
  name: Run Terraform
  identifier: run_terraform
  versionLabel: v1.0.1
  type: Stage
  projectIdentifier: platform
  orgIdentifier: platform
  tags: {}
  spec:
    type: Custom
    spec:
      execution:
        steps:
          # PATCH: tighter default timeout
          - step:
              type: TerraformPlan
              name: Plan
              identifier: tfPlan
              spec:
                configuration:
                  command: Apply
              timeout: 10m
