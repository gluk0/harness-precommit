template:
  name: Performance Benchmark
  identifier: perf_benchmark
  versionLabel: v1.0.0
  type: Stage
  projectIdentifier: platform
  orgIdentifier: platform
  tags: {}
  spec:
    type: Custom
    spec:
      execution:
        steps:
          - step:
              type: ShellScript
              name: Run Benchmark
              identifier: runBenchmark
              spec:
                shell: Bash
                source:
                  type: Inline
                  spec:
                    script: |
                      ab -n 1000 -c 10 <+input>
              timeout: 20m
      variables:
        - name: baselineRef
          type: String
          value: <+input>
