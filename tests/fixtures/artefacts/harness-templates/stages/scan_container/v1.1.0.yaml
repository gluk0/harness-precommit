template:
  name: Scan Container
  identifier: scan_container
  versionLabel: v1.1.0
  type: Stage
  projectIdentifier: platform
  orgIdentifier: platform
  tags: {}
  spec:
    type: SecurityTests
    spec:
      cloneCodebase: false
      execution:
        steps:
          - step:
              type: AquaTrivy
              name: Trivy Scan
              identifier: trivyScan
              spec:
                mode: orchestration
                config: default
                target:
                  type: container
                  name: <+input>
                  variant: <+input>
                advanced:
                  log:
                    level: info
              timeout: 20m
      variables:
        # MINOR: new optional minimum severity filter.
        - name: severity
          type: String
          value: <+input>.default("HIGH")
        # MINOR: new optional exit-on-critical flag.
        - name: exitOnCritical
          type: String
          value: <+input>.default("true")
