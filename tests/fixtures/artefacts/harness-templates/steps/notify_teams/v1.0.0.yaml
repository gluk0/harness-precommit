template:
  name: Notify Teams
  identifier: notify_teams
  versionLabel: v1.0.0
  type: Step
  projectIdentifier: platform
  orgIdentifier: platform
  tags: {}
  spec:
    type: ShellScript
    spec:
      shell: Bash
      source:
        type: Inline
        spec:
          script: |
            curl -X POST -H 'Content-Type: application/json' \
              -d '{"text":"<+input>"}' \
              <+input>
    timeout: 2m
