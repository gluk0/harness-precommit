template:
  name: Integration Release
  identifier: integration_release
  versionLabel: v1.0.0
  type: Pipeline
  projectIdentifier: my_team
  orgIdentifier: my_team
  tags: {}
  spec:
    stages:
      - stage:
          name: Integration Tests
          identifier: integrationTests
          template:
            templateRef: account.integration_test
            versionLabel: v1.0.0
            templateInputs:
              type: CI
              spec:
                execution:
                  steps:
                    - step:
                        identifier: integrationTests
                        type: Run
                        spec:
                          connectorRef: org.k8s_connector
                          image: python:3.12
      - stage:
          name: Deploy
          identifier: deploy
          template:
            templateRef: account.deploy_to_k8s
            versionLabel: v1.2.0
            templateInputs:
              type: Deployment
              spec:
                service:
                  serviceRef: <+services.backend>
      - stage:
          name: Ticket
          identifier: ticket
          type: Custom
          spec:
            execution:
              steps:
                - step:
                    name: Create Deploy Ticket
                    identifier: createDeployTicket
                    template:
                      templateRef: account.create_jira_ticket
                      versionLabel: v1.0.0
                      templateInputs:
                        type: JiraCreate
                        spec:
                          connectorRef: org.jira
                          projectKey: OPS
                          summary: Deployed backend
